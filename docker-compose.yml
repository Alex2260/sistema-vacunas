version: '3.8'

services:
  db:
    image: postgres:15
    container_name: vacunas-db
    environment:
      POSTGRES_DB: vacunas_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vacunas-net
    restart: unless-stopped

  api:
    build: .
    container_name: vacunas-api
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/vacunas_db
    networks:
      - vacunas-net
    restart: unless-stopped

networks:
  vacunas-net:
    driver: bridge

volumes:
  pg_data:
